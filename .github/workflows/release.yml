name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --features "ntds.dit"

      - name: Strip binary
        run: strip target/release/vmkatz

      - name: Archive binary
        run: |
          mkdir -p dist
          cp target/release/vmkatz dist/vmkatz
          tar -C dist -czf vmkatz-${{ github.ref_name }}-linux-x86_64.tar.gz vmkatz

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vmkatz-${{ github.ref_name }}-linux-x86_64.tar.gz
